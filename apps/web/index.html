<!doctype html>
<!--
  Minimal SPA shell for the collaborative whiteboard.
  The React app mounts at #root. Vite injects the module script
  (<script type="module" src="/src/main.tsx">) at dev/build time.
  No other scripts or styles are needed — Vite handles bundling.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collaborative Whiteboard</title>
    <meta name="description" content="Real-time multi-user collaborative whiteboard" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
